name: Build Windows EXE and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a version tag like v1.0.0

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
        contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # Change to match your project's Python version
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # If your app requires external libraries, uncomment the line below:
          # pip install -r requirements.txt

      - name: Build Executable with Spec File Only
        run: |
          pyinstaller -F ping_scan.py
        # NOTE: Replace "your_config.spec" with the actual name of your file. 
        # Command line parameters like --onefile are ignored when using a spec file.

      - name: Upload Binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
